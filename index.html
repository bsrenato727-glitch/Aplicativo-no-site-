<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTARIA REMBRANDT - V4.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #075E54; --accent: #25D366; --bg: #f0f2f5; --red: #ff4d4d; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); touch-action: manipulation; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-success { background: var(--accent); color: white; border: none; font-weight: bold; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); margin-top: 10px; }
        .btn-danger { background: var(--red); color: white; border: none; margin-top: 5px; font-size: 14px; padding: 8px; }
        .item-temp { background: #ffffff; padding: 10px; margin-top: 8px; border-radius: 6px; font-size: 0.95rem; border: 1px solid #dae1e9; border-left: 5px solid var(--blue); }
        .hidden { display: none !important; }
        #reader { width: 100%; border-radius: 8px; margin-top: 10px; display: none; background: #000; overflow: hidden; }
        .galeria-fotos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .foto-container { position: relative; width: 80px; height: 80px; }
        .foto-mini { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #signature-pad { border: 2px solid #333; background: #fff; width: 100%; height: 200px; border-radius: 8px; touch-action: none; margin-top: 10px; }
        .lista-moradores-scroll { max-height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #ddd; padding: 5px; border-radius: 8px; background: #fafafa; }
        .morador-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>🏢 PORTARIA REMBRANDT</header>

<div class="container">
    <div id="tela-registro" class="card">
        <h3>📥 Registrar Encomenda</h3>
        <select id="apt-select" onchange="window.verificarMorador()"></select>
        
        <div style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #eee;">
            <input type="text" id="protocolo-input" placeholder="Protocolo/Código">
            <button class="btn-outline" onclick="window.abrirScanner()">📷 SCANNER</button>
            <div id="reader"></div>
            <input type="text" id="desc-input" placeholder="O que chegou?">
            <button class="btn-outline" style="background:var(--blue); color:white; border:none;" onclick="window.incluirNaLista()">➕ ADICIONAR ITEM</button>
        </div>
        <div id="lista-temp"></div>

        <label style="display:block; margin-top:20px; font-weight:bold;">📸 Fotos das Encomendas:</label>
        <input type="file" id="foto-input" accept="image/*" capture="camera" onchange="window.processarFoto(this)">
        <div id="galeria" class="galeria-fotos"></div>

        <button class="btn-success" id="btn-salvar-geral" onclick="window.registrarEntrada()" style="margin-top:25px; display:none;">SALVAR E AVISAR WHATSAPP</button>
        <button class="btn-outline" onclick="window.abrirGestao()" style="margin-top:40px; border-style: dashed; color: #555;">⚙️ GESTÃO DE MORADORES</button>
    </div>

    <div id="tela-cadastro" class="card hidden">
        <h3>👥 Gerenciar Moradores</h3>
        <div style="background: #eef1f5; padding: 12px; border-radius: 8px;">
            <input type="number" id="cad-apto" placeholder="Apto">
            <input type="text" id="cad-nome" placeholder="Nome">
            <input type="text" id="cad-whats" placeholder="WhatsApp">
            <button class="btn-success" onclick="window.salvarMorador()">CADASTRAR</button>
        </div>
        <div id="lista-contatos-excluir" class="lista-moradores-scroll"></div>
        <button class="btn-outline" onclick="window.fecharGestao()">VOLTAR</button>
    </div>

    <div id="tela-entrega" class="card hidden">
        <h3>📤 Retirada de Encomenda</h3>
        <div id="detalhes-entrega-texto" style="margin-bottom: 15px; font-size: 0.9rem;"></div>
        <input type="text" id="nome-receptor" placeholder="Quem está retirando?">
        <label style="display:block; margin-top:10px;">Assinatura:</label>
        <canvas id="signature-pad"></canvas>
        <button class="btn-danger" onclick="window.limparAssinatura()">🧹 LIMPAR ASSINATURA</button>
        
        <button class="btn-success" onclick="window.finalizarEntrega()" style="margin-top:25px;">CONCLUIR E GERAR RECIBO</button>
        <button class="btn-outline" onclick="location.reload()">CANCELAR</button>
    </div>

    <div id="lista-aguardando">
        <h3>📦 Encomendas na Portaria</h3>
        <div id="itens-lista"></div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://fpfykmxwtmngxeyyljaz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwZnlrbXh3dG1uZ3hleXlsamF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODU5NjAsImV4cCI6MjA5MDk2MTk2MH0.yaFPUO_2phJwqma5VaHNfLqSqnuWqLZdxchL3YB6KSA');

    let moradorAtual = null, entregaAtual = null, listaRascunho = [], listaFotos = [];
    let canvas, ctx, desenhando = false;

    function tocarBipSupermercado() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(750, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        setTimeout(() => oscillator.stop(), 120);
    }

    window.onload = carregarTudo;

    async function carregarTudo() {
        const { data: moras } = await supabase.from('Moradores').select('*').order('Apartamento');
        const sel = document.getElementById('apt-select');
        sel.innerHTML = '<option value="">Selecione o Apto...</option>';
        if(moras) moras.forEach(m => sel.innerHTML += `<option value="${m.Apartamento}">Apto ${m.Apartamento} - ${m.Morador}</option>`);

        const listaExcluir = document.getElementById('lista-contatos-excluir');
        listaExcluir.innerHTML = moras ? moras.map(m => `
            <div class="morador-item">
                <span><b>${m.Apartamento}</b> - ${m.Morador}</span>
                <button onclick="window.excluirMorador(${m.id})" style="width:auto; background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">🗑️</button>
            </div>
        `).join("") : "";

        const { data: encs } = await supabase.from('Encomendas').select('*').eq('Status', 'pendente').order('created_at', {ascending: false});
        const listaEnc = document.getElementById('itens-lista');
        listaEnc.innerHTML = "";
        if(encs) encs.forEach(i => {
            listaEnc.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:6px solid var(--primary);">
                <span><b>Apto ${i.Apartamento}</b><br><small>${i.Descrição.split(' | ').join(', ')}</small></span>
                <button onclick='window.abrirEntrega(${JSON.stringify(i)})' style="width:auto; padding:8px 15px; background:var(--primary); color:white; border:none; border-radius:5px;">ENTREGAR</button>
            </div>`;
        });
    }

    window.abrirScanner = () => {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 150 } },
            (txt) => { 
                tocarBipSupermercado();
                document.getElementById('protocolo-input').value = txt; 
                html5QrCode.stop(); 
                readerDiv.style.display = 'none'; 
            }
        ).catch(() => alert("Permita a câmera."));
    };

    window.incluirNaLista = () => {
        const desc = document.getElementById('desc-input').value;
        if(!desc) return;
        const prot = document.getElementById('protocolo-input').value;
        listaRascunho.push({ desc: desc, prot: prot || "S/ Protocolo" });
        document.getElementById('lista-temp').innerHTML = listaRascunho.map(i => `<div class="item-temp">📦 ${i.desc} <br><small>Prot: ${i.prot}</small></div>`).join("");
        document.getElementById('protocolo-input').value = ""; document.getElementById('desc-input').value = "";
        document.getElementById('btn-salvar-geral').style.display = 'block';
    };

    window.registrarEntrada = async () => {
        const apto = document.getElementById('apt-select').value;
        const descricaoFinal = listaRascunho.map(i => `${i.desc} (Prot: ${i.prot})`).join(' | ');
        const { error } = await supabase.from('Encomendas').insert([{ Apartamento: apto, Morador: moradorAtual?.Morador, Descrição: descricaoFinal, Status: 'pendente' }]);
        
        if(!error) {
            localStorage.setItem('fotos_' + apto, JSON.stringify(listaFotos));
            if(moradorAtual?.Status) {
                const tel = moradorAtual.Status.replace(/\D/g, '');
                let volumesMsg = "";
                listaRascunho.forEach((item, index) => {
                    volumesMsg += `*Volume ${index + 1}:*%0A${item.desc}%0AProtocolo: ${item.prot}%0A%0A`;
                });
                const msg = `🏢 *PORTARIA REMBRANDT*%0A%0A📍 *Encomenda Chegou!*%0AApartamento: *${apto}*%0A%0A${volumesMsg}_Disponível na portaria._`;
                window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`, '_blank');
            }
            location.reload();
        }
    };

    window.abrirEntrega = async (item) => {
        entregaAtual = item;
        const { data } = await supabase.from('Moradores').select('*').eq('Apartamento', item.Apartamento).maybeSingle();
        moradorAtual = data;
        document.getElementById('tela-registro').classList.add('hidden');
        document.getElementById('lista-aguardando').classList.add('hidden');
        document.getElementById('tela-entrega').classList.remove('hidden');
        document.getElementById('detalhes-entrega-texto').innerHTML = `<b>Apto ${item.Apartamento}</b><br>${item.Descrição.split(' | ').join('<br>')}`;
        setTimeout(iniciarAssinatura, 300);
    };

    window.limparAssinatura = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    window.finalizarEntrega = async () => {
        const receptor = document.getElementById('nome-receptor').value;
        if(!receptor) return alert("Quem está retirando?");
        
        const dataHora = new Date().toLocaleString('pt-BR');
        const fotosSalvas = JSON.parse(localStorage.getItem('fotos_' + entregaAtual.Apartamento) || "[]");

        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        doc.setFontSize(16); doc.text("RECIBO - PORTARIA REMBRANDT", 20, 20);
        doc.setFontSize(11);
        doc.text(`Apartamento: ${entregaAtual.Apartamento}`, 20, 35);
        doc.text(`Retirado por: ${receptor}`, 20, 42);
        doc.text(`Data/Hora: ${dataHora}`, 20, 49);
        let y = 60; doc.text("Volumes:", 20, y);
        entregaAtual.Descrição.split(' | ').forEach(linha => { y += 7; doc.text(`- ${linha}`, 25, y); });
        if(fotosSalvas.length > 0) {
            y += 10; let x = 20;
            fotosSalvas.slice(0, 4).forEach(img => { doc.addImage(img, 'JPEG', x, y, 40, 40); x += 45; });
            y += 45;
        }
        doc.addImage(canvas.toDataURL(), 'PNG', 20, y + 10, 70, 25);
        doc.save(`Recibo_Apto_${entregaAtual.Apartamento}.pdf`);
        localStorage.removeItem('fotos_' + entregaAtual.Apartamento);

        if(moradorAtual?.Status) {
            const tel = moradorAtual.Status.replace(/\D/g, '');
            let itensRetirados = "";
            entregaAtual.Descrição.split(' | ').forEach(i => itensRetirados += `• ${i}%0A`);
            const msgR = `🏢 *PORTARIA REMBRANDT*%0A%0A✅ *Retirada Confirmada!*%0AApartamento: *${entregaAtual.Apartamento}*%0AQuem retirou: *${receptor}*%0AData: ${dataHora.split(' ')[0]}%0AHorário: ${dataHora.split(' ')[1]}%0A%0A*Encomendas retiradas:*%0A${itensRetirados}`;
            window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${msgR}`, '_blank');
        }

        await supabase.from('Encomendas').update({ Status: 'entregue' }).eq('id', entregaAtual.id);
        location.reload();
    };

    // --- AUXILIARES ---
    window.processarFoto = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvasComp = document.createElement('canvas');
                    const max_size = 800;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                    else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                    canvasComp.width = width; canvasComp.height = height;
                    const ctxComp = canvasComp.getContext('2d'); ctxComp.drawImage(img, 0, 0, width, height);
                    listaFotos.push(canvasComp.toDataURL('image/jpeg', 0.7));
                    renderGaleria();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    };
    function renderGaleria() {
        document.getElementById('galeria').innerHTML = listaFotos.map((f, i) => `
            <div class="foto-container"><img src="${f}" class="foto-mini"><button class="btn-del" onclick="window.removerFoto(${i})">X</button></div>
        `).join("");
    }
    window.removerFoto = (idx) => { listaFotos.splice(idx, 1); renderGaleria(); };
    window.salvarMorador = async () => {
        const a = document.getElementById('cad-apto').value;
        const n = document.getElementById('cad-nome').value;
        const w = document.getElementById('cad-whats').value;
        await supabase.from('Moradores').insert([{ Apartamento: a, Morador: n, Status: w, created_at: new Date().toISOString() }]);
        location.reload();
    };
    window.excluirMorador = async (id) => { if(confirm("Apagar?")) { await supabase.from('Moradores').delete().eq('id', id); carregarTudo(); } };
    window.abrirGestao = () => { document.getElementById('tela-registro').classList.add('hidden'); document.getElementById('lista-aguardando').classList.add('hidden'); document.getElementById('tela-cadastro').classList.remove('hidden'); };
    window.fecharGestao = () => location.reload();

    function iniciarAssinatura() {
        canvas = document.getElementById('signature-pad'); ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 3;
        const getPos = (e) => {
            const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - r.left, y: t.clientY - r.top };
        };
        canvas.addEventListener('touchstart', (e) => { ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); desenhando = true; e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if(desenhando) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchend', () => desenhando = false);
    }
    window.verificarMorador = async () => {
        const a = document.getElementById('apt-select').value;
        const { data } = await supabase.from('Moradores').select('*').eq('Apartamento', a).maybeSingle();
        moradorAtual = data;
    };
</script>
</body>
</html>
