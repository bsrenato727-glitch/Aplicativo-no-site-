<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTARIA REMBRANDT - V5.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #075E54; --accent: #25D366; --bg: #f0f2f5; --red: #ff4d4d; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); touch-action: manipulation; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-success { background: var(--accent); color: white; border: none; font-weight: bold; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); margin-top: 10px; }
        .btn-danger { background: var(--red); color: white; border: none; margin-top: 5px; font-size: 14px; padding: 8px; }
        .hidden { display: none !important; }
        #signature-pad { border: 2px solid #333; background: #fff; width: 100%; height: 200px; border-radius: 8px; touch-action: none; margin-top: 10px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 90%; max-width: 350px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .hist-item { font-size: 0.85rem; border-bottom: 1px solid #eee; padding: 8px 0; color: #444; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2>🔒 Portaria Login</h2>
        <input type="email" id="log-email" placeholder="E-mail">
        <input type="password" id="log-pass" placeholder="Senha">
        <button class="btn-success" id="btn-entrar">ENTRAR</button>
        <p id="msg-erro" style="color:red; display:none; margin-top:10px;">Acesso Negado!</p>
    </div>
</div>

<div id="app-content" class="hidden">
    <header>🏢 PORTARIA REMBRANDT</header>
    <div class="container">
        
        <div id="tela-registro" class="card">
            <h3>📥 Nova Encomenda</h3>
            <select id="apt-select" onchange="window.verificarMorador()"></select>
            <input type="text" id="desc-input" placeholder="O que chegou? (Shopee, Mercado Livre...)">
            <input type="text" id="protocolo-input" placeholder="Protocolo (Opcional)">
            <button class="btn-success" id="btn-salvar-geral" onclick="window.registrarSimples()">CADASTRAR E NOTIFICAR</button>
        </div>

        <div id="tela-entrega" class="card hidden">
            <h3>📤 Retirada de Encomenda</h3>
            <div id="detalhes-entrega-texto" style="margin-bottom: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px;"></div>
            <input type="text" id="nome-receptor" placeholder="Quem está retirando?">
            <label style="display:block; margin-top:10px;">Assinatura:</label>
            <canvas id="signature-pad"></canvas>
            <button class="btn-danger" onclick="window.limparAssinatura()">🧹 LIMPAR ASSINATURA</button>
            
            <button class="btn-success" id="btn-concluir-entrega" onclick="window.darBaixaDefinitiva()" style="margin-top:20px;">CONFIRMAR E GERAR RECIBO</button>
            <button class="btn-outline" onclick="location.reload()">VOLTAR / CANCELAR</button>
        </div>

        <div id="lista-aguardando">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>📦 Encomendas na Portaria</h3>
                <button onclick="location.reload()" style="width:auto; padding:5px 10px; font-size:12px;">🔄 ATUALIZAR</button>
            </div>
            <div id="itens-lista">Carregando...</div>
        </div>

        <button class="btn-outline" id="btn-toggle-hist" onclick="window.toggleHist()" style="margin-bottom: 20px;">🕒 VER HISTÓRICO DE ENTREGAS</button>
        <div id="secao-historico" class="card hidden">
            <h3>Últimas 50 Entregas</h3>
            <div id="lista-historico"></div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://fpfykmxwtmngxeyyljaz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwZnlrbXh3dG1uZ3hleXlsamF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODU5NjAsImV4cCI6MjA5MDk2MTk2MH0.yaFPUO_2phJwqma5VaHNfLqSqnuWqLZdxchL3YB6KSA');

    let moradorAtual = null, entregaAtual = null;
    let canvas, ctx, desenhando = false;

    // LOGIN
    document.getElementById('btn-entrar').onclick = async () => {
        const { error } = await supabase.auth.signInWithPassword({
            email: document.getElementById('log-email').value,
            password: document.getElementById('log-pass').value
        });
        if (error) document.getElementById('msg-erro').style.display = 'block';
        else location.reload();
    };

    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            carregarTudo();
        }
    };

    async function carregarTudo() {
        // Carrega Moradores
        const { data: m } = await supabase.from('Moradores').select('*').order('Apartamento');
        const sel = document.getElementById('apt-select');
        sel.innerHTML = '<option value="">Selecione o Apto...</option>';
        if(m) m.forEach(mor => sel.innerHTML += `<option value="${mor.Apartamento}">${mor.Apartamento} - ${mor.Morador}</option>`);

        // Carrega Pendentes
        const { data: e } = await supabase.from('Encomendas').select('*').eq('Status', 'pendente').order('created_at', {ascending: false});
        const lista = document.getElementById('itens-lista');
        lista.innerHTML = (e && e.length > 0) ? "" : "Nada pendente no momento.";
        if(e) {
            e.forEach(item => {
                const div = document.createElement('div');
                div.className = "card";
                div.style = "border-left: 6px solid var(--primary); display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 10px;";
                div.innerHTML = `<div><b>Apto ${item.Apartamento}</b><br><small>${item.Descrição}</small></div>`;
                const btn = document.createElement('button');
                btn.innerText = "ENTREGAR";
                btn.style = "width: auto; padding: 8px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold;";
                btn.onclick = () => window.abrirPainelEntrega(item);
                div.appendChild(btn);
                lista.appendChild(div);
            });
        }

        // Carrega Histórico
        const { data: h } = await supabase.from('Encomendas').select('*').eq('Status', 'entregue').order('updated_at', {ascending: false}).limit(50);
        if(h) document.getElementById('lista-historico').innerHTML = h.map(i => `<div class="hist-item"><b>Apto ${i.Apartamento}</b> - ${i.Descrição.substring(0,30)}...<br><small>${new Date(i.updated_at).toLocaleString()}</small></div>`).join("");
    }

    window.registrarSimples = async () => {
        const btn = document.getElementById('btn-salvar-geral');
        const apto = document.getElementById('apt-select').value;
        const desc = document.getElementById('desc-input').value;
        const prot = document.getElementById('protocolo-input').value || "S/P";
        
        if(!apto || !desc) return alert("Selecione o apartamento e descreva a encomenda.");
        
        btn.disabled = true; btn.innerText = "GRAVANDO...";

        const { error } = await supabase.from('Encomendas').insert([{
            Apartamento: apto,
            Descrição: `${desc} | Prot: ${prot}`,
            Status: 'pendente'
        }]);

        if(!error) {
            if(moradorAtual?.Status) {
                const tel = moradorAtual.Status.replace(/\D/g, '');
                const msg = `🏢 *PORTARIA REMBRANDT*%0A%0A📍 *Encomenda Chegou!*%0AApartamento: *${apto}*%0AItem: ${desc}%0A%0A_Disponível na portaria._`;
                window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`;
            } else { location.reload(); }
        } else {
            alert("Erro ao salvar: " + error.message);
            btn.disabled = false; btn.innerText = "TENTAR NOVAMENTE";
        }
    };

    window.abrirPainelEntrega = (item) => {
        entregaAtual = item;
        window.buscarDadosMorador(item.Apartamento);
        document.getElementById('tela-registro').classList.add('hidden');
        document.getElementById('lista-aguardando').classList.add('hidden');
        document.getElementById('tela-entrega').classList.remove('hidden');
        document.getElementById('detalhes-entrega-texto').innerHTML = `<b>APTO: ${item.Apartamento}</b><br>${item.Descrição}`;
        setTimeout(iniciarAssinatura, 300);
    };

    window.darBaixaDefinitiva = async () => {
        const receptor = document.getElementById('nome-receptor').value;
        if(!receptor) return alert("Por favor, digite quem está retirando.");

        const btn = document.getElementById('btn-concluir-entrega');
        btn.disabled = true; btn.innerText = "DANDO BAIXA...";

        // AJUSTE CRÍTICO: Uso do ID direto da memória para não errar o alvo
        const { error } = await supabase
            .from('Encomendas')
            .update({ 
                Status: 'entregue', 
                updated_at: new Date().toISOString() 
            })
            .eq('id', entregaAtual.id);

        if(!error) {
            // Gerar PDF básico
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("RECIBO DE ENTREGA - PORTARIA REMBRANDT", 20, 20);
            doc.text(`Apartamento: ${entregaAtual.Apartamento}`, 20, 30);
            doc.text(`Retirado por: ${receptor}`, 20, 40);
            doc.text(`Data: ${new Date().toLocaleString()}`, 20, 50);
            doc.addImage(canvas.toDataURL(), 'PNG', 20, 60, 60, 20);
            doc.save(`Recibo_Apto_${entregaAtual.Apartamento}.pdf`);

            // WhatsApp e Recarregar
            if(moradorAtual?.Status) {
                const tel = moradorAtual.Status.replace(/\D/g, '');
                const msg = `🏢 *PORTARIA REMBRANDT*%0A%0A✅ *Retirada Confirmada!*%0AApartamento: *${entregaAtual.Apartamento}*%0AQuem retirou: *${receptor}*`;
                window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`;
            } else { location.reload(); }
        } else {
            alert("ERRO NA BAIXA: " + error.message);
            btn.disabled = false; btn.innerText = "CONFIRMAR ENTREGA";
        }
    };

    window.buscarDadosMorador = async (apto) => {
        const { data } = await supabase.from('Moradores').select('*').eq('Apartamento', apto).maybeSingle();
        moradorAtual = data;
    };

    window.verificarMorador = () => {
        const a = document.getElementById('apt-select').value;
        if(a) window.buscarDadosMorador(a);
    };

    function iniciarAssinatura() {
        canvas = document.getElementById('signature-pad'); ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = 200; ctx.lineWidth = 3;
        const getPos = (e) => {
            const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - r.left, y: t.clientY - r.top };
        };
        canvas.addEventListener('touchstart', (e) => { ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); desenhando = true; e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if(desenhando) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchend', () => desenhando = false);
    }

    window.limparAssinatura = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); };
    window.toggleHist = () => {
        const sec = document.getElementById('secao-historico');
        sec.classList.toggle('hidden');
        document.getElementById('btn-toggle-hist').innerText = sec.classList.contains('hidden') ? "🕒 VER HISTÓRICO DE ENTREGAS" : "🔼 ESCONDER HISTÓRICO";
    };
</script>
</body>
</html>
