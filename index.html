<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PORTARIA REMBRANDT - V5.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #075E54; --accent: #25D366; --bg: #f0f2f5; --red: #ff4d4d; --blue: #007bff; --gray: #6c757d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); touch-action: manipulation; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-success { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); margin-top: 10px; cursor: pointer; }
        .btn-danger { background: var(--red); color: white; border: none; margin-top: 5px; font-size: 14px; padding: 8px; }
        .item-temp { background: #ffffff; padding: 10px; margin-top: 8px; border-radius: 6px; font-size: 0.95rem; border: 1px solid #dae1e9; border-left: 5px solid var(--blue); }
        .hidden { display: none !important; }
        #reader { width: 100%; border-radius: 8px; margin-top: 10px; display: none; background: #000; overflow: hidden; }
        .galeria-fotos { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .foto-container { position: relative; width: 80px; height: 80px; }
        .foto-mini { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #ccc; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #signature-pad { border: 2px solid #333; background: #fff; width: 100%; height: 200px; border-radius: 8px; touch-action: none; margin-top: 10px; }
        .hist-item { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .badge-entregue { background: #d4edda; color: #155724; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 90%; max-width: 350px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay hidden">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p>Salvando na Nuvem...</p>
</div>

<div id="login-overlay">
    <div class="login-card">
        <h2>🔒 Portaria Rembrandt</h2>
        <input type="email" id="log-email" placeholder="E-mail">
        <input type="password" id="log-pass" placeholder="Senha">
        <button class="btn-success" id="btn-entrar">ENTRAR</button>
        <p id="msg-erro" style="color:red; font-size: 14px; margin-top: 10px; display: none;">Acesso Negado!</p>
    </div>
</div>

<div id="app-content" class="hidden">
    <header>🏢 PORTARIA REMBRANDT</header>

    <div class="container">
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <button class="btn-outline" onclick="window.location.reload()" style="margin-top:0; flex:1;">🏠 INÍCIO</button>
            <button class="btn-outline" onclick="window.abrirHistorico()" style="margin-top:0; flex:1; background: var(--gray); color: white; border: none;">📜 HISTÓRICO</button>
        </div>

        <div id="tela-registro" class="card">
            <h3>📥 Registrar Encomenda</h3>
            <select id="apt-select" onchange="window.verificarMorador()"></select>
            
            <div style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #eee;">
                <input type="text" id="protocolo-input" placeholder="Protocolo/Código">
                <button class="btn-outline" onclick="window.abrirScanner()">📷 SCANNER</button>
                <div id="reader"></div>
                <input type="text" id="desc-input" placeholder="O que chegou?">
                <button class="btn-outline" style="background:var(--blue); color:white; border:none;" onclick="window.incluirNaLista()">➕ ADICIONAR ITEM</button>
            </div>
            <div id="lista-temp"></div>

            <label style="display:block; margin-top:20px; font-weight:bold;">📸 Fotos (Nuvem):</label>
            <input type="file" id="foto-input" accept="image/*" capture="camera" onchange="window.processarFoto(this)">
            <div id="galeria" class="galeria-fotos"></div>

            <button class="btn-success" id="btn-salvar-geral" onclick="window.registrarEntrada()" style="margin-top:25px; display:none;">SALVAR E AVISAR WHATSAPP</button>
        </div>

        <div id="tela-historico" class="card hidden">
            <h3>📜 Últimas 50 Entregas</h3>
            <div id="lista-historico-conteudo" style="max-height: 450px; overflow-y: auto;"></div>
            <button class="btn-outline" onclick="window.location.reload()">VOLTAR</button>
        </div>

        <div id="tela-entrega" class="card hidden">
            <h3>📤 Retirada</h3>
            <div id="detalhes-entrega-texto" style="margin-bottom: 15px; font-size: 0.9rem;"></div>
            <input type="text" id="nome-receptor" placeholder="Quem está retirando?">
            <label style="display:block; margin-top:10px;">Assinatura:</label>
            <canvas id="signature-pad"></canvas>
            <button class="btn-danger" onclick="window.limparAssinatura()">🧹 LIMPAR</button>
            <button class="btn-success" onclick="window.finalizarEntrega()" style="margin-top:25px;">CONCLUIR</button>
        </div>

        <div id="lista-aguardando">
            <h3>📦 Encomendas na Portaria</h3>
            <div id="itens-lista"></div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient('https://fpfykmxwtmngxeyyljaz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwZnlrbXh3dG1uZ3hleXlsamF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODU5NjAsImV4cCI6MjA5MDk2MTk2MH0.yaFPUO_2phJwqma5VaHNfLqSqnuWqLZdxchL3YB6KSA');

    let moradorAtual = null, entregaAtual = null, listaRascunho = [], listaFotos = [];
    let canvas, ctx, desenhando = false;

    // LOGIN
    document.getElementById('btn-entrar').onclick = async () => {
        const { error } = await supabase.auth.signInWithPassword({ 
            email: document.getElementById('log-email').value, 
            password: document.getElementById('log-pass').value 
        });
        if (error) document.getElementById('msg-erro').style.display = 'block'; else liberarAcesso();
    };

    async function verificarSessao() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) liberarAcesso();
    }
    window.onload = verificarSessao;

    function liberarAcesso() {
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        carregarTudo();
    }

    async function carregarTudo() {
        const { data: moras } = await supabase.from('Moradores').select('*').order('Apartamento');
        const sel = document.getElementById('apt-select');
        if(sel) {
            sel.innerHTML = '<option value="">Selecione o Apto...</option>';
            moras?.forEach(m => sel.innerHTML += `<option value="${m.Apartamento}">Apto ${m.Apartamento} - ${m.Morador}</option>`);
        }
        
        const { data: encs } = await supabase.from('Encomendas').select('*').eq('Status', 'pendente').order('created_at', {ascending: false});
        const listaEnc = document.getElementById('itens-lista');
        if(listaEnc) {
            listaEnc.innerHTML = encs?.map(i => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left:6px solid var(--primary);">
                    <span><b>Apto ${i.Apartamento}</b><br><small>${i.Descrição}</small></span>
                    <button onclick='window.abrirEntrega(${JSON.stringify(i)})' style="width:auto; padding:8px 12px; background:var(--primary); color:white; border:none; border-radius:5px;">ENTREGAR</button>
                </div>
            `).join("") || "";
        }
    }

    // UPLOAD PARA STORAGE
    async function uploadParaStorage(base64, nome) {
        const blob = await fetch(base64).then(res => res.blob());
        const { data, error } = await supabase.storage.from('fotos_encomendas').upload(nome, blob, { upsert: true });
        if (error) throw error;
        return supabase.storage.from('fotos_encomendas').getPublicUrl(nome).data.publicUrl;
    }

    window.registrarEntrada = async () => {
        const apto = document.getElementById('apt-select').value;
        if(!apto) return alert("Selecione o apartamento!");

        document.getElementById('loader').classList.remove('hidden');

        try {
            let linksFotos = [];
            for(let i=0; i<listaFotos.length; i++) {
                const nomeImg = `encomenda_${apto}_${Date.now()}_${i}.jpg`;
                const url = await uploadParaStorage(listaFotos[i], nomeImg);
                linksFotos.push(url);
            }

            const descFinal = listaRascunho.map(i => `${i.desc} (Prot: ${i.prot})`).join(' | ');
            await supabase.from('Encomendas').insert([{ 
                Apartamento: apto, 
                Morador: moradorAtual?.Morador, 
                Descrição: descFinal, 
                Status: 'pendente',
                Fotos: linksFotos 
            }]);

            const tel = moradorAtual?.Status?.replace(/\D/g, '');
            
            listaRascunho = []; listaFotos = [];
            document.getElementById('lista-temp').innerHTML = "";
            document.getElementById('galeria').innerHTML = "";
            document.getElementById('loader').classList.add('hidden');
            carregarTudo();

            if(tel) {
                const msg = `🏢 *PORTARIA REMBRANDT*%0A%0A📦 *Encomenda Disponível!*%0AApto: *${apto}*%0AItens: ${descFinal.replace(/\|/g, '%0A•')}`;
                window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`;
            }
        } catch (e) {
            alert("Erro: " + e.message);
            document.getElementById('loader').classList.add('hidden');
        }
    };

    window.abrirHistorico = async () => {
        document.getElementById('tela-registro').classList.add('hidden');
        document.getElementById('lista-aguardando').classList.add('hidden');
        document.getElementById('tela-historico').classList.remove('hidden');
        
        const { data } = await supabase.from('Encomendas').select('*').eq('Status', 'entregue').order('updated_at', { ascending: false }).limit(50);
        document.getElementById('lista-historico-conteudo').innerHTML = data?.map(h => `
            <div class="hist-item">
                <div style="display:flex; justify-content:space-between;"><b>Apto ${h.Apartamento}</b> <span class="badge-entregue">ENTREGUE</span></div>
                <div style="color:#666; margin:4px 0;">${h.Descrição}</div>
                <div style="font-size:10px; color:#999;">📅 ${new Date(h.updated_at).toLocaleString('pt-BR')}</div>
            </div>
        `).join("") || "Nenhum histórico.";
    };

    window.abrirEntrega = async (item) => {
        entregaAtual = item;
        const { data } = await supabase.from('Moradores').select('*').eq('Apartamento', item.Apartamento).maybeSingle();
        moradorAtual = data;
        document.getElementById('tela-registro').classList.add('hidden');
        document.getElementById('lista-aguardando').classList.add('hidden');
        document.getElementById('tela-entrega').classList.remove('hidden');
        document.getElementById('detalhes-entrega-texto').innerHTML = `<b>Apto ${item.Apartamento}</b><br>${item.Descrição}`;
        setTimeout(iniciarAssinatura, 300);
    };

    window.finalizarEntrega = async () => {
        const receptor = document.getElementById('nome-receptor').value;
        if(!receptor) return alert("Informe quem está retirando!");

        await supabase.from('Encomendas').update({ Status: 'entregue', updated_at: new Date().toISOString() }).eq('id', entregaAtual.id);
        
        document.getElementById('tela-entrega').classList.add('hidden');
        document.getElementById('tela-registro').classList.remove('hidden');
        document.getElementById('lista-aguardando').classList.remove('hidden');
        carregarTudo();

        if(moradorAtual?.Status) {
            const tel = moradorAtual.Status.replace(/\D/g, '');
            const msg = `🏢 *PORTARIA REMBRANDT*%0A%0A✅ *Retirada Confirmada!*%0AApto: *${entregaAtual.Apartamento}*%0ARecebido por: *${receptor}*`;
            window.location.href = `https://api.whatsapp.com/send?phone=55${tel}&text=${msg}`;
        }
    };

    window.abrirScanner = () => {
        const r = document.getElementById('reader'); r.style.display = 'block';
        const q = new Html5QrCode("reader");
        q.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
            document.getElementById('protocolo-input').value = t;
            q.stop(); r.style.display = 'none';
        });
    };

    window.incluirNaLista = () => {
        const d = document.getElementById('desc-input').value; if(!d) return;
        listaRascunho.push({ desc: d, prot: document.getElementById('protocolo-input').value || "S/P" });
        document.getElementById('lista-temp').innerHTML = listaRascunho.map(i => `<div class="item-temp">📦 ${i.desc}</div>`).join("");
        document.getElementById('desc-input').value = ""; document.getElementById('protocolo-input').value = "";
        document.getElementById('btn-salvar-geral').style.display = 'block';
    };

    window.processarFoto = (input) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cv = document.createElement('canvas');
                const ctxCv = cv.getContext('2d');
                cv.width = 600; cv.height = (img.height / img.width) * 600;
                ctxCv.drawImage(img, 0, 0, cv.width, cv.height);
                listaFotos.push(cv.toDataURL('image/jpeg', 0.7));
                renderGaleria();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    };

    function renderGaleria() {
        document.getElementById('galeria').innerHTML = listaFotos.map((f, i) => `
            <div class="foto-container"><img src="${f}" class="foto-mini"><button class="btn-del" onclick="window.removerFoto(${i})">X</button></div>
        `).join("");
    }
    window.removerFoto = (i) => { listaFotos.splice(i, 1); renderGaleria(); };

    function iniciarAssinatura() {
        canvas = document.getElementById('signature-pad'); ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = 200; ctx.lineWidth = 3;
        const getPos = (e) => {
            const r = canvas.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - r.left, y: t.clientY - r.top };
        };
        canvas.addEventListener('touchstart', (e) => { ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); desenhando = true; e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { if(desenhando) { const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } e.preventDefault(); });
        canvas.addEventListener('touchend', () => desenhando = false);
    }
    window.limparAssinatura = () => ctx.clearRect(0,0,canvas.width,canvas.height);
    window.verificarMorador = async () => {
        const a = document.getElementById('apt-select').value;
        const { data } = await supabase.from('Moradores').select('*').eq('Apartamento', a).maybeSingle();
        moradorAtual = data;
    };
</script>
</body>
</html>
